<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#0f172a" rx="20"/>
  
  <g stroke="#38bdf8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Letter A left diagonal and crossbar -->
    <path d="M 50 15 L 20 85" />
    <path d="M 32 60 L 50 60" />
    
    <!-- Shared center peak/line -->
    <path d="M 50 15 L 50 85" stroke-opacity="0.3"/>
    
    <!-- Letter S geometric stylized -->
    <path d="M 80 25 C 80 15, 60 15, 60 25 C 60 45, 80 40, 80 60 C 80 75, 60 75, 55 65" />
    
    <!-- Neon circuit accent dots -->
    <circle cx="50" cy="15" r="4" fill="#38bdf8" stroke="none" />
    <circle cx="20" cy="85" r="4" fill="#38bdf8" stroke="none" />
    <circle cx="55" cy="65" r="4" fill="#38bdf8" stroke="none" />
  </g>
</svg>
